name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Verify tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(node -p "require('./package.json').version")"
      - run: npm ci
      - run: npm run release:check
      - name: Build release archive and checksum
        run: |
          artifact=$(npm pack --silent)
          sha256sum "$artifact" > SHA256SUMS
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "$ARTIFACT" SHA256SUMS --verify-tag --generate-notes
